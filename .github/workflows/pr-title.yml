name: Pull Request Title

on:
  pull_request_target:
    types: [opened, edited, reopened, labeled, unlabeled]
    branches:
      - "master"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  conventional-commit:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      # Shared between both steps. Must stay portable across bash ERE and JS
      # regex (no lookarounds, named groups, or other JS-only features).
      # Revert PRs nest the reverted commit's type, e.g. `revert: feat(api): undo X`,
      # so the semver label can track the magnitude of the original change.
      PR_TITLE_PATTERN: '^(revert(!)?: )?(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\(([^)]+)\))?(!)?: .+'
    steps:
      - name: Validate PR title against Conventional Commits
        if: >-
          github.event.action == 'opened' ||
          github.event.action == 'reopened' ||
          (github.event.action == 'edited' && github.event.changes.title != null)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$PR_TITLE" =~ $PR_TITLE_PATTERN ]]; then
            echo "::error::PR title does not follow Conventional Commits format."
            echo "Got:      $PR_TITLE"
            echo "Expected: <type>(<scope>)?(!)?: <subject>"
            echo "          revert(!)?: <type>(<scope>)?(!)?: <subject>  (for reverts)"
            echo "Allowed types: feat, fix, docs, style, refactor, perf, test, build, ci, chore"
            echo "Revert PRs must embed the original commit's type so the semver impact can"
            echo "be determined (e.g. 'revert: feat(scope): original title')."
            echo "Reverts of reverts re-apply the original change, so use the original"
            echo "title (e.g. 'feat: x', not 'revert: revert: feat: x')."
            exit 1
          fi
          echo "PR title OK: $PR_TITLE"

      - name: Sync labels with PR title
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const TYPES = [
              'feat', 'fix', 'docs', 'style', 'refactor',
              'perf', 'test', 'build', 'ci', 'chore', 'revert',
            ]

            const pattern = new RegExp(process.env.PR_TITLE_PATTERN)
            const parse = (title) => {
              const m = (title || '').match(pattern)
              if (!m) return {}
              const isRevert = !!m[1]
              return {
                type: isRevert ? 'revert' : m[3],
                revertedType: isRevert ? m[3] : undefined,
                scope: m[5],
                breaking: m[2] === '!' || m[6] === '!',
              }
            }

            // For reverts, the semver bump tracks the magnitude of the change
            // being undone, parsed from the nested type in the title.
            const semverFor = ({ type, revertedType, breaking }) => {
              if (!type) return undefined
              if (breaking) return 'semver-major'
              const effective = type === 'revert' ? revertedType : type
              if (effective === 'feat') return 'semver-minor'
              if (effective === 'fix' || effective === 'perf' || effective === 'refactor') {
                return 'semver-patch'
              }
              return undefined
            }

            const pr = context.payload.pull_request
            const next = parse(pr.title)

            const labelExists = async (name) => {
              try {
                await github.rest.issues.getLabel({ ...context.repo, name })
                return true
              } catch (e) {
                if (e.status === 404) return false
                throw e
              }
            }

            const current = new Set((pr.labels || []).map(l => l.name))
            const desired = new Set(current)

            // Reconcile type labels: title is source of truth, remove any
            // other known conventional-commit type label. No labelExists check
            // needed — TYPES is a static list that must be created in the repo.
            for (const name of desired) {
              if (TYPES.includes(name) && name !== next.type) desired.delete(name)
            }
            if (next.type) desired.add(next.type)

            // Reconcile scope/* labels: title is source of truth.
            const targetScope = next.scope ? `scope/${next.scope}` : undefined
            for (const name of desired) {
              if (name.startsWith('scope/') && name !== targetScope) desired.delete(name)
            }
            if (targetScope && !desired.has(targetScope) && await labelExists(targetScope)) {
              desired.add(targetScope)
            }

            // Reconcile semver-* labels to match the current title. The title
            // is the source of truth: any other semver-* label is removed.
            const targetSemver = semverFor(next)
            for (const name of desired) {
              if (name.startsWith('semver-') && name !== targetSemver) desired.delete(name)
            }
            if (targetSemver) desired.add(targetSemver)

            const unchanged = current.size === desired.size && [...current].every(l => desired.has(l))
            if (!unchanged) {
              await github.rest.issues.setLabels({
                ...context.repo,
                issue_number: pr.number,
                labels: [...desired],
              })
            }
