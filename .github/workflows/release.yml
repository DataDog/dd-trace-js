name: Releases

on:
  push:
    branches:
      - v3.x
      - v4.x
      - v5.x
      - v6.x
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # npm dist-tag for each release line.
    # The latest branch always gets "latest" automatically.
    # Add a line here when creating a new release branch.
    env:
      DIST_TAGS: |
        v3.x latest-node14
        v4.x latest-node16
        v5.x latest-node18
        v6.x latest-node22
    outputs:
      npm_tag: ${{ steps.compute.outputs.npm_tag }}
      is_latest: ${{ steps.compute.outputs.is_latest }}
    steps:
      - id: compute
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="${{ github.ref_name }}"

          # Find the latest release line by intersecting the GitHub branch
          # list with DIST_TAGS. This ensures a branch that exists in the
          # repo but is not yet wired into the config cannot steal the
          # latest tag before triggers and dist-tag mappings are updated.
          configured=$(echo "$DIST_TAGS" | awk '{print $1}')
          latest=$(gh api "repos/${{ github.repository }}/branches" \
            --paginate \
            --jq '.[].name' \
            | grep -E '^v[0-9]+\.x$' \
            | grep -Fx -f <(echo "$configured") \
            | sort -V \
            | tail -1)

          # Collect the tag defined for this branch (field after the branch name)
          branch_tag=$(echo "$DIST_TAGS" | awk -v b="$branch" '$1==b{print $2}')

          if [ "$branch" = "$latest" ]; then
            npm_tag="latest"
            is_latest="true"
          else
            npm_tag="${branch_tag:-latest-${branch%.x}}"
            is_latest="false"
          fi

          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"
          echo "is_latest=$is_latest" >> "$GITHUB_OUTPUT"

  publish:
    needs: setup
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://npmjs.com/package/dd-trace
    permissions:
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/dd-trace-js
          policy: self.github.release.push-tags
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/node
      - id: pkg
        run: |
          content=`cat ./package.json | tr '\n' ' '`
          echo "json=$content" >> $GITHUB_OUTPUT
      - name: Publish
        run: |
          version="${{ fromJson(steps.pkg.outputs.json).version }}"
          tag="${{ needs.setup.outputs.npm_tag }}"

          # Idempotent: skip publish if this version already exists so
          # that a rerun after a partial failure can still repair the git
          # tag and release notes.
          if npm view "dd-trace@$version" version 2>/dev/null | grep -qF "$version"; then
            local_integrity=$(npm pack --dry-run --json 2>/dev/null | jq -r '.[0].integrity')
            published_integrity=$(npm view "dd-trace@$version" dist.integrity 2>/dev/null)
            if [ "$local_integrity" != "$published_integrity" ]; then
              echo "ERROR: package content at current HEAD differs from dd-trace@$version on the registry" >&2
              echo "  Published: $published_integrity" >&2
              echo "  Current:   $local_integrity" >&2
              exit 1
            fi
            echo "Version $version already published with identical content, skipping npm publish"
          else
            npm publish --tag "$tag"
          fi
      - name: Tag release
        run: |
          version="${{ fromJson(steps.pkg.outputs.json).version }}"
          remote="https://x-access-token:${{ steps.octo-sts.outputs.token }}@github.com/${{ github.repository }}.git"
          if git ls-remote --tags "$remote" "v$version" | grep -q "v$version"; then
            echo "Tag v$version already exists, skipping"
          else
            git tag "v$version"
            git push "$remote" "v$version"
          fi
      - name: Release notes
        run: |
          if [ "${{ needs.setup.outputs.is_latest }}" = "true" ]; then
            node scripts/release/notes --latest
          else
            node scripts/release/notes
          fi
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}

  publish-electron-latest:
    needs: publish-latest
    if: github.event_name == 'push' && github.event.ref == 'refs/heads/v5.x'
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://npmjs.com/package/dd-trace-electron
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/node
      - run: node scripts/release/publish-electron.js

  docs:
    needs: [setup, publish]
    if: needs.setup.outputs.is_latest == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/node
      - id: pkg
        run: |
          content=`cat ./package.json | tr '\n' ' '`
          echo "json=$content" >> $GITHUB_OUTPUT
      - run: yarn
      - name: Build
        working-directory: docs
        run: |
          yarn
          yarn build
          mv out /tmp/out
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
      - name: Deploy
        run: |
          rm -rf *
          mv /tmp/out/* .
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m ${{ fromJson(steps.pkg.outputs.json).version }}
          git push
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

  publish-electron-dev:
    needs: publish-dev
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://npmjs.com/package/dd-trace-electron
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/node
      - uses: ./.github/actions/install
      - id: pkg
        run: |
          content=`cat ./package.json | tr '\n' ' '`
          echo "json=$content" >> $GITHUB_OUTPUT
      - run: npm version --no-git-tag-version ${{ fromJson(steps.pkg.outputs.json).version }}-$(git rev-parse --short HEAD)+${{ github.run_id }}.${{ github.run_attempt }}
      - run: node scripts/release/publish-electron.js --tag dev

  publish-dev:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://npmjs.com/package/dd-trace
    permissions:
      id-token: write
    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/dd-trace-js
          policy: self.github.release.push-tags
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/node
      - uses: ./.github/actions/install
      - id: pkg
        run: |
          content=`cat ./package.json | tr '\n' ' '`
          echo "json=$content" >> $GITHUB_OUTPUT
      - run: npm version --no-git-tag-version ${{ fromJson(steps.pkg.outputs.json).version }}-$(git rev-parse --short HEAD)+${{ github.run_id }}.${{ github.run_attempt }}
      - run: npm publish --tag dev
      - run: |
          git tag --force dev
          git push https://x-access-token:${{ steps.octo-sts.outputs.token }}@github.com/${{ github.repository }}.git :refs/tags/dev
          git push https://x-access-token:${{ steps.octo-sts.outputs.token }}@github.com/${{ github.repository }}.git --tags
