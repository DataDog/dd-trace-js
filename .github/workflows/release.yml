name: Releases

on:
  push:
    branches:
      - v3.x
      - v4.x
      - v5.x
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Space-separated npm dist-tags for each release line.
    # The latest branch always gets "latest" prepended automatically.
    # Add a line here when creating a new release branch.
    env:
      DIST_TAGS: |
        v3.x latest-node14
        v4.x latest-node16
        v5.x latest-node18 latest-node20
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      is_latest: ${{ steps.compute.outputs.is_latest }}
    steps:
      - id: compute
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="${{ github.ref_name }}"

          # List all v*.x release line branches and find the highest one
          latest=$(gh api "repos/${{ github.repository }}/branches" \
            --paginate \
            --jq '.[].name' \
            | grep -E '^v[0-9]+\.x$' \
            | sort -V \
            | tail -1)

          # Collect the tags defined for this branch (everything after the branch name)
          branch_tags=$(echo "$DIST_TAGS" | awk -v b="$branch" '$1==b{$1=""; sub(/^ /,""); print}')

          if [ "$branch" = "$latest" ]; then
            npm_tags="latest ${branch_tags:-latest-${branch%.x}}"
            is_latest="true"
          else
            npm_tags="${branch_tags:-latest-${branch%.x}}"
            is_latest="false"
          fi

          matrix=$(jq -cn \
            --arg branch "$branch" \
            --arg npm_tags "$npm_tags" \
            '{"include":[{"branch":$branch,"npm_tags":$npm_tags}]}')

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "is_latest=$is_latest" >> "$GITHUB_OUTPUT"

  publish:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    environment:
      name: npm
      url: https://npmjs.com/package/dd-trace
    permissions:
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/dd-trace-js
          policy: self.github.release.push-tags
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/node
      - id: pkg
        run: |
          content=`cat ./package.json | tr '\n' ' '`
          echo "json=$content" >> $GITHUB_OUTPUT
      - name: Publish
        run: |
          tags=(${{ matrix.npm_tags }})
          npm publish --tag "${tags[0]}"
          version="${{ fromJson(steps.pkg.outputs.json).version }}"
          for tag in "${tags[@]:1}"; do
            npm dist-tag add "dd-trace@$version" "$tag"
          done
      - run: |
          git tag v${{ fromJson(steps.pkg.outputs.json).version }}
          git push https://x-access-token:${{ steps.octo-sts.outputs.token }}@github.com/${{ github.repository }}.git v${{ fromJson(steps.pkg.outputs.json).version }}
      - name: Release notes
        run: |
          if [ "${{ needs.setup.outputs.is_latest }}" = "true" ]; then
            node scripts/release/notes --latest
          else
            node scripts/release/notes
          fi
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}

  docs:
    needs: [setup, publish]
    if: needs.setup.outputs.is_latest == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/node
      - id: pkg
        run: |
          content=`cat ./package.json | tr '\n' ' '`
          echo "json=$content" >> $GITHUB_OUTPUT
      - run: yarn
      - name: Build
        working-directory: docs
        run: |
          yarn
          yarn build
          mv out /tmp/out
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
      - name: Deploy
        run: |
          rm -rf *
          mv /tmp/out/* .
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m ${{ fromJson(steps.pkg.outputs.json).version }}
          git push
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

  publish-dev:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://npmjs.com/package/dd-trace
    permissions:
      id-token: write
    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/dd-trace-js
          policy: self.github.release.push-tags
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/node
      - uses: ./.github/actions/install
      - id: pkg
        run: |
          content=`cat ./package.json | tr '\n' ' '`
          echo "json=$content" >> $GITHUB_OUTPUT
      - run: npm version --no-git-tag-version ${{ fromJson(steps.pkg.outputs.json).version }}-$(git rev-parse --short HEAD)+${{ github.run_id }}.${{ github.run_attempt }}
      - run: npm publish --tag dev
      - run: |
          git tag --force dev
          git push https://x-access-token:${{ steps.octo-sts.outputs.token }}@github.com/${{ github.repository }}.git :refs/tags/dev
          git push https://x-access-token:${{ steps.octo-sts.outputs.token }}@github.com/${{ github.repository }}.git --tags
