name: Debugger

on:
  pull_request:
    paths:
      # Paths for whole project (should be same in all workflows)
      - '**'
      - '!.github/workflows/**'
      - '!.gitlab/**'
      - '!.vscode/**'
      - '!devdocs/**'
      - '!examples/**'
      - '!*.md'
      - '!.gitlab-ci.yml'
      - '!LICENSE*'
      - 'LICENSE-3rdparty.csv'
      - '!NOTICE'
      # Paths for this workflow only
      - '.github/workflows/debugger.yml'
  push:
    branches: [master]
  schedule:
    - cron: 0 4 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ubuntu:
    strategy:
      matrix:
        version: [oldest, maintenance, active, latest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/testagent/start
      - uses: ./.github/actions/node
        with:
          version: ${{ matrix.version }}
      - uses: ./.github/actions/install
      - run: yarn test:debugger:ci
      - run: yarn test:integration:debugger
        env:
          OPTIONS_OVERRIDE: 1
      - if: always()
        uses: ./.github/actions/testagent/logs
        with:
          suffix: debugger-ubuntu-${{ matrix.version }}
      - uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d # v5.4.2
