name: "CodeQL"

on:
  push:
    branches: [master, mq-working-branch-master-*]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  # We shell out to the CodeQL CLI directly rather than using github/codeql-action.
  # The official action wraps the CLI but also makes GitHub API calls (bundle version
  # checks, check-run updates) using whatever token is provided. Those calls reach
  # github/codeql-action — a repo outside the DataDog org — which a dd-octo-sts
  # installation token scoped to DataDog/dd-trace-js cannot access, causing 404s
  # that the action surfaces as a misleading permissions error. By invoking the CLI
  # directly we keep GitHub API usage to checkout (dd-octo-sts token) and the single
  # SARIF upload + status-poll (dd-octo-sts token), with no cross-org calls.
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript"]

    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/dd-trace-js
          policy: codeql-analysis

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.octo-sts.outputs.token }}

      - name: Initialize CodeQL
        id: init-codeql
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql_config.yml
          token: ${{ steps.octo-sts.outputs.token }}
          # If you wish to specify custom queries, you can do so here or in a config file.
          # By default, queries listed here will override any specified in a config file.
          # Prefix the list here with "+" to use these queries and those in the config file.
          # queries: ./path/to/local/query, your-org/your-repo/queries@main

      - name: Create CodeQL database
        run: |
          "${{ steps.init-codeql.outputs.codeql-path }}" database create "$RUNNER_TEMP/codeql-db" \
            --language=${{ matrix.language }} \
            --source-root=. \
            --codescanning-config=.github/codeql_config.yml \
            --overwrite

      - name: Run CodeQL analysis
        run: |
          "${{ steps.init-codeql.outputs.codeql-path }}" database analyze "$RUNNER_TEMP/codeql-db" \
            'codeql/javascript-queries:codeql-suites/javascript-code-scanning.qls' \
            --format=sarif-latest \
            --output="$RUNNER_TEMP/results.sarif" \
            --sarif-category=${{ matrix.language }} \
            --threads=0

      - name: Upload SARIF results
        env:
          TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          RESPONSE=$(jq -n \
            --arg commit_sha "$GITHUB_SHA" \
            --arg ref "$GITHUB_REF" \
            --arg sarif "$(gzip -c "$RUNNER_TEMP/results.sarif" | base64 -w0)" \
            '{commit_sha: $commit_sha, ref: $ref, sarif: $sarif}' \
          | curl -sf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/code-scanning/sarifs" \
            --data-binary @-)
          SARIF_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "SARIF upload accepted (id: $SARIF_ID)"

          # Poll every 10s (30x = 5 min total), matching the official action's timeout
          # but halving the API calls vs the official action's 5s interval.
          for i in $(seq 1 30); do
            RESULT=$(curl -sf \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/code-scanning/sarifs/$SARIF_ID")
            STATUS=$(echo "$RESULT" | jq -r '.processing_status')
            echo "Processing status: $STATUS"
            if [ "$STATUS" = "complete" ]; then exit 0; fi
            if [ "$STATUS" = "failed" ]; then
              echo "$RESULT" | jq -r '.errors // empty'
              exit 1
            fi
            sleep 10
          done
          echo "SARIF processing timed out after 5 minutes"
          exit 1
