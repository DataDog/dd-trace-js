name: "CodeQL"

on:
  push:
    branches: [master, mq-working-branch-master-*]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  # We use codeql-action/init and codeql-action/analyze but skip the built-in
  # SARIF upload (upload: never) and handle it ourselves with a dd-octo-sts token.
  # The official analyze action's upload step was failing: it uses whatever token
  # is provided for the SARIF API call, and our dd-octo-sts token (scoped to
  # DataDog/dd-trace-js) was getting 404s from GitHub's code scanning endpoint.
  # Separating analysis from upload lets the actions handle CLI management while
  # keeping the SARIF upload + status-poll under our explicit token control.
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      checks: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript"]

    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/dd-trace-js
          policy: codeql-analysis

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.octo-sts.outputs.token }}

      - name: Record analysis start time
        run: echo "CODEQL_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Initialize CodeQL
        id: init-codeql
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql_config.yml
          token: ${{ steps.octo-sts.outputs.token }}
          # If you wish to specify custom queries, you can do so here or in a config file.
          # By default, queries listed here will override any specified in a config file.
          # Prefix the list here with "+" to use these queries and those in the config file.
          # queries: ./path/to/local/query, your-org/your-repo/queries@main

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          upload: never
          output: ${{ runner.temp }}/sarif-results
          category: /language:${{ matrix.language }}

      - name: Upload SARIF results
        env:
          TOKEN: ${{ steps.octo-sts.outputs.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          SARIF_FILE=$(find "$RUNNER_TEMP/sarif-results" -name "*.sarif" | head -1)
          [ -n "$SARIF_FILE" ] || { echo "No SARIF file found"; exit 1; }

          # For PRs use the head ref/SHA; for pushes GITHUB_REF/SHA are correct.
          HEAD_SHA=$(jq -r '.pull_request.head.sha // empty' "$GITHUB_EVENT_PATH")
          if [ -n "$HEAD_SHA" ]; then
            UPLOAD_REF="${GITHUB_REF/\/merge/\/head}"
            UPLOAD_SHA="$HEAD_SHA"
          else
            UPLOAD_REF="$GITHUB_REF"
            UPLOAD_SHA="$GITHUB_SHA"
          fi

          # Create code scanning check run (mirrors official action behaviour).
          CHECK_RUN_RESPONSE=$(jq -n \
            --arg head_sha "$UPLOAD_SHA" \
            --arg started_at "$CODEQL_STARTED_AT" \
            '{name:"Code scanning results / CodeQL",head_sha:$head_sha,
              status:"in_progress",started_at:$started_at}' \
          | curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/check-runs" \
            --data-binary @-)
          CHECK_RUN_ID=$(echo "$CHECK_RUN_RESPONSE" | jq -r '.id // empty')
          if [ -z "$CHECK_RUN_ID" ]; then
            echo "Warning: failed to create check run: $CHECK_RUN_RESPONSE"
          fi

          HTTP_STATUS=$(jq -n \
            --arg commit_sha "$UPLOAD_SHA" \
            --arg ref "$UPLOAD_REF" \
            --arg sarif "$(gzip -c "$SARIF_FILE" | base64 -w0)" \
            --arg checkout_uri "file://$GITHUB_WORKSPACE/" \
            --arg started_at "$CODEQL_STARTED_AT" \
            '{commit_sha:$commit_sha,ref:$ref,sarif:$sarif,
              checkout_uri:$checkout_uri,started_at:$started_at}' \
          | curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/code-scanning/sarifs" \
            --data-binary @-)
          RESPONSE=$(echo "$HTTP_STATUS" | head -n -1)
          STATUS_CODE=$(echo "$HTTP_STATUS" | tail -1)
          echo "HTTP $STATUS_CODE: $RESPONSE"
          echo "$STATUS_CODE" | grep -q "^2" || exit 1
          SARIF_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "SARIF upload accepted (id: $SARIF_ID)"

          # Poll with dd-octo-sts token (not GH_TOKEN) to avoid rate-limit impact.
          # GH_TOKEN is only used for the single upload call above to get the
          # correct analysis_key; subsequent reads use the bot token instead.
          CONCLUSION="failure"
          ERRORS=""
          for i in $(seq 1 30); do
            RESULT=$(curl -sf \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/code-scanning/sarifs/$SARIF_ID")
            STATUS=$(echo "$RESULT" | jq -r '.processing_status')
            echo "Processing status: $STATUS"
            if [ "$STATUS" = "complete" ]; then CONCLUSION="success"; break; fi
            if [ "$STATUS" = "failed" ]; then
              ERRORS=$(echo "$RESULT" | jq -r '.errors // empty')
              echo "$ERRORS"
              break
            fi
            sleep 10
          done

          # Fetch alert count from the processed analysis.
          ALERT_COUNT=0
          if [ "$CONCLUSION" = "success" ]; then
            ALERT_COUNT=$(curl -sf \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/code-scanning/analyses?ref=$UPLOAD_REF&sarif_id=$SARIF_ID" \
              | jq -r '.[0].results_count // 0')
            echo "Alerts found: $ALERT_COUNT"
          fi

          # Update check run to reflect final status (only if creation succeeded).
          if [ -n "$CHECK_RUN_ID" ]; then
            jq -n \
              --arg conclusion "$CONCLUSION" \
              --arg completed_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg summary "$ERRORS" \
              --argjson count "$ALERT_COUNT" \
              '{status:"completed",conclusion:$conclusion,completed_at:$completed_at,
                output:{title:("\($count) code scanning alert(s) found"),summary:$summary}}' \
            | curl -sf -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/check-runs/$CHECK_RUN_ID" \
              --data-binary @-
          fi

          [ "$CONCLUSION" = "success" ] || exit 1
