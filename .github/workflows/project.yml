name: Project

on:
  pull_request:
  push:
    branches: [master, mq-working-branch-master-*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/node/latest
      - name: actionlint
        id: actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
        with:
          matcher: true
          fail-on-error: true
          shellcheck: false # TODO should we enable this?
      - name: actionlint Summary
        if: ${{ steps.actionlint.outputs.exit-code != 0 }}
        run: |
          echo "Used actionlint version ${{ steps.actionlint.outputs.version-semver }}"
          echo "Used actionlint release ${{ steps.actionlint.outputs.version-tag }}"
          echo "actionlint ended with ${{ steps.actionlint.outputs.exit-code }} exit code"
          echo "actionlint ended because '${{ steps.actionlint.outputs.exit-message }}'"
          echo "actionlint found ${{ steps.actionlint.outputs.total-errors }} errors"
          echo "actionlint checked ${{ steps.actionlint.outputs.total-files }} files"
          echo "actionlint cache used: ${{ steps.actionlint.outputs.cache-hit }}"
          exit ${{ steps.actionlint.outputs.exit-code }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/node/latest
      - uses: ./.github/actions/install
      - run: npm run lint && npm run lint:codeowners:ci

  verify-exercised-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/node/latest
      - uses: ./.github/actions/install
      - run: npm run verify-exercised-tests

  generated-config-types:
    runs-on: ubuntu-latest
    name: Generated config types
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/node/latest
      - run: npm run verify:config:types

  workflow-job-names:
    runs-on: ubuntu-latest
    name: Workflow job names (unique)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            .github
            scripts/verify-workflow-job-names.js
      - uses: ./.github/actions/node/latest
      - run: npm install yaml
      - run: node scripts/verify-workflow-job-names.js

  # The package size is especially useful in constrained environments, so the
  # computation is done only on the package that would be installed there.
  # In order to do that, the current folder is wiped and replaced with what
  # would be installed is those environments before running the computation.
  package-size-report:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/dd-trace-js
          policy: package-size-report
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/node/latest
      - run: FILENAME=$(npm pack --silent --pack-destination /tmp) && mv /tmp/$FILENAME /tmp/dd-trace.tgz
      - run: rm -rf *
      - run: tar -zxf /tmp/dd-trace.tgz -C $(pwd) --strip-components=1
      - run: bun install --production --omit=optional
      - run: ls -lisa
      - name: Compute module size tree and report
        uses: qard/heaviest-objects-in-the-universe@1e02edbdda803a45537a808ede97866db47756d3 # Unreleased
        with:
          github-token: ${{ steps.octo-sts.outputs.token }}

  static-analysis:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    name: Datadog Static Analyzer
    if: github.actor != 'dependabot[bot]' && github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dd-sts-api-key
        id: dd-sts-api-key
      - uses: ./.github/actions/dd-sts-app-key
        id: dd-sts-app-key
      - name: Check code meets quality and security standards
        id: datadog-static-analysis
        uses: DataDog/datadog-static-analyzer-github-action@8340f18875fcefca86844b5f947ce2431387e552 # v3.0.0
        with:
          dd_api_key: ${{ steps.dd-sts-api-key.outputs.api_key }}
          dd_app_key: ${{ steps.dd-sts-app-key.outputs.app_key }}
          dd_site: datadoghq.com
          cpu_count: 2

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/node/latest
      - uses: ./.github/actions/install
      - run: npm run type:doc:test
      - run: npm run type:doc:build

  # TODO: Remove need for `npm show` before re-enabling to avoid rate limit errors.
  # verify-yaml:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  #     - uses: ./.github/actions/node/latest
  #     - uses: ./.github/actions/install
  #     - run: node scripts/verify-ci-config.js

  supported-integrations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/node/latest
      - uses: ./.github/actions/install
      - run: npm run generate:supported-integrations
      - id: diff
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed="$(git diff --name-only | sort -u)"
          expected="$(printf 'supported_versions_output.json\nsupported_versions_table.csv')"
          if [ "$changed" != "$expected" ]; then
            echo "Unexpected paths changed during regeneration:" >&2
            echo "$changed" >&2
            exit 1
          fi

          if [ "$EVENT_NAME" != "pull_request" ] || [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "Out of date. Run 'npm run generate:supported-integrations' locally and commit." >&2
            exit 1
          fi

          mkdir -p "${RUNNER_TEMP}/supported-integrations"
          cp supported_versions_output.json supported_versions_table.csv "${RUNNER_TEMP}/supported-integrations/"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
      - if: steps.diff.outputs.has_changes == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: supported-integrations
          path: ${{ runner.temp }}/supported-integrations
          if-no-files-found: error

  supported-integrations-push:
    # The bot pushes via the GitHub API, which re-triggers `pull_request: synchronize` with
    # `github.actor == 'dd-octo-sts[bot]'`. Skip that follow-up run so we don't push twice.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.supported-integrations.outputs.has_changes == 'true' && github.actor != 'dd-octo-sts[bot]'
    runs-on: ubuntu-latest
    needs: supported-integrations
    permissions:
      id-token: write
    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/dd-trace-js
          policy: supported-integrations
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: supported-integrations
          path: ${{ runner.temp }}/supported-integrations
      - env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          EXPECTED: ${{ github.event.pull_request.head.sha }}
          DIR: ${{ runner.temp }}/supported-integrations
        run: |
          set -euo pipefail
          # gh's `-f variables=<json>` does not parse the value as JSON; build
          # the `{query, variables}` body with jq and pipe via `--input -`.
          jq -nc \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "$BRANCH" \
            --arg expected "$EXPECTED" \
            --arg json "$(base64 -w 0 "$DIR/supported_versions_output.json")" \
            --arg csv "$(base64 -w 0 "$DIR/supported_versions_table.csv")" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { url } } }",
              variables: { input: {
                branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                message: { headline: "chore: update supported-integrations" },
                expectedHeadOid: $expected,
                fileChanges: { additions: [
                  { path: "supported_versions_output.json", contents: $json },
                  { path: "supported_versions_table.csv", contents: $csv }
                ] }
              } }
            }' | gh api graphql --input - >/dev/null
