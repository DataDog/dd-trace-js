  next:
    strategy:
      fail-fast: false
      matrix:
        version:
          - 18
          - latest
        range:
          - ">=10.2.0 <11"
          - ">=11.0.0 <13"
          - "11.1.4"
          - ">=13.0.0 <14"
          - "13.2.0"
          - ">=14.0.0 <=14.2.6"
          - ">=14.2.7 <15"
          - ">=15.0.0 <15.4.1"
        include:
          - range: ">=10.2.0 <11"
            range_clean: gte.10.2.0.and.lt.11
          - range: ">=11.0.0 <13"
            range_clean: gte.11.0.0.and.lt.13
          - range: "11.1.4"
            range_clean: 11.1.4
          - range: ">=13.0.0 <14"
            range_clean: gte.13.0.0.and.lt.14
          - range: "13.2.0"
            range_clean: 13.2.0
          - range: ">=14.0.0 <=14.2.6"
            range_clean: gte.14.0.0.and.lte.14.2.6
          - range: ">=14.2.7 <15"
            range_clean: gte.14.2.7.and.lt.15
          - range: ">=15.0.0 <15.4.1"
            range_clean: gte.15.0.0
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
