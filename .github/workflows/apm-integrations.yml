  couchbase:
    strategy:
      matrix:
        node-version: [eol]
        range:
          # - '^2.6.12' skipping due to bug with couchbase integration that is blocking CI.
          # TODO: diagnose and fix failures. Link to bug issue: https://github.com/DataDog/dd-trace-js/issues/6400
          - "^3.0.7"
          - ">=4.0.0 <4.2.0"
        include:
          - node-version: 18
            range: ">=4.2.0"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    services:
      couchbase:
        image: ghcr.io/datadog/couchbase-server-sandbox:latest
        ports:
          - 8091-8095:8091-8095
          - 11210:11210
    env:
      PLUGINS: couchbase
      SERVICES: couchbase
      PACKAGE_VERSION_RANGE: ${{ matrix.range }}
      DD_INJECT_FORCE: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - uses: ./.github/actions/testagent/start
      - uses: ./.github/actions/node
        with:
          version: ${{ matrix.node-version }}
      - uses: ./.github/actions/install
      - run: yarn config set ignore-engines true
      - run: yarn test:plugins:ci --ignore-engines
      - uses: ./.github/actions/coverage
        with:
          flags: apm-integrations-couchbase-${{ matrix.node-version }}
          dd_api_key: ${{ steps.dd-sts.outputs.api_key }}
      - uses: ./.github/actions/push_to_test_optimization
        if: "!cancelled()"
        with:
          dd_api_key: ${{ steps.dd-sts.outputs.api_key }}

  connect:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PLUGINS: connect
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/plugins/test-and-upstream

  dns:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PLUGINS: dns
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - uses: ./.github/actions/testagent/start
      - uses: ./.github/actions/node/oldest-maintenance-lts
      - uses: ./.github/actions/install
      - run: yarn test:plugins:ci
      - uses: ./.github/actions/node/newest-maintenance-lts
      - run: yarn test:plugins:ci
      - uses: ./.github/actions/node/active-lts
      - run: yarn test:plugins:ci
      - uses: ./.github/actions/node/latest
