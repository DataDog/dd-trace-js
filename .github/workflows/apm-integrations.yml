name: APM Integrations

on:
  pull_request:
  push:
    branches: [master, mq-working-branch-master-*]
  schedule:
    - cron: 0 4 * * *
  workflow_dispatch:
    inputs:
      latest-version:
        description: "Node version to run"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.latest-version }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  MOCHA_OPTIONS: ${{ github.ref == 'refs/heads/master' && '--retries 1' || '' }}
  LATEST_VERSION: ${{ inputs.latest-version }}

# TODO: upstream jobs

jobs:
  aerospike:
    strategy:
      matrix:
        node-version: [eol]
        range: [">=4.0.0 <5.2.0"]
        aerospike-image: [ce-5.7.0.15]
        test-image: [ubuntu-22.04]
        include:
          - node-version: 18
            range: ">=5.2.0 <6.3.0"
            range_clean: gte.5.2.0
            aerospike-image: ce-6.4.0.3
            test-image: ubuntu-latest
          - node-version: 20
            range: ">=5.5.0"
            range_clean: gte.5.5.0
            aerospike-image: ce-6.4.0.3
            test-image: ubuntu-latest
          - node-version: 22
            range: ">=5.12.1"
            range_clean: gte.5.12.1
            aerospike-image: ce-6.4.0.3
            test-image: ubuntu-latest
          - node-version: 22
            range: ">=6.0.0"
            range_clean: gte.6.0.0
            aerospike-image: ce-6.4.0.3
            test-image: ubuntu-latest
    runs-on: ${{ matrix.test-image }}
    permissions:
      id-token: write
    services:
      aerospike:
        image: aerospike:${{ matrix.aerospike-image }}
        ports:
          - "127.0.0.1:3000-3002:3000-3002"
    env:
      PLUGINS: aerospike
      SERVICES: aerospike
      PACKAGE_VERSION_RANGE: ${{ matrix.range }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - uses: ./.github/actions/testagent/start
      - uses: ./.github/actions/node
        with:
          version: ${{ matrix.node-version }}
      - run: yarn config set ignore-engines true
      - name: Install dependencies
        uses: ./.github/actions/install
      - name: Run tests
        run: yarn test:plugins:ci
      - if: always()
        uses: ./.github/actions/testagent/logs
        with:
          suffix: plugins-${{ github.job }}-${{ matrix.node-version }}-${{ matrix.range_clean }}
      - uses: ./.github/actions/coverage
        with:
          flags: apm-integrations-aerospike-${{ matrix.node-version }}-${{ matrix.range_clean }}
          dd_api_key: ${{ steps.dd-sts.outputs.api_key }}
      - uses: ./.github/actions/push_to_test_optimization
        if: "!cancelled()"
        with:
          dd_api_key: ${{ steps.dd-sts.outputs.api_key }}

  amqp10:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    services:
      qpid:
        image: scholzj/qpid-cpp:1.38.0
        env:
          QPIDD_ADMIN_USERNAME: admin
          QPIDD_ADMIN_PASSWORD: admin
        ports:
          - 5673:5672
    env:
      PLUGINS: amqp10
      SERVICES: qpid
      DD_DATA_STREAMS_ENABLED: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/plugins/test-and-upstream

  amqplib:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    services:
      rabbitmq:
        image: rabbitmq:3.6-alpine
        ports:
          - 5672:5672
    env:
      PLUGINS: amqplib
      SERVICES: rabbitmq
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/plugins/test-and-upstream

  apollo:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
