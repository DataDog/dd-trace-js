name: APM Capabilities

on:
  pull_request:
  push:
    branches: [master, mq-working-branch-master-*]
  schedule:
    - cron: 0 4 * * *
  workflow_dispatch:
    inputs:
      latest-version:
        description: "Node version to use"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.latest-version }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  MOCHA_OPTIONS: ${{ github.ref == 'refs/heads/master' && '--retries 1' || '' }}
  LATEST_VERSION: ${{ inputs.latest-version }}

jobs:
  get-credentials:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    outputs:
      api_key: ${{ steps.dd-sts.outputs.api_key }}
    steps:
      - name: Get Datadog credentials
        id: dd-sts
        uses: DataDog/dd-sts-action@2e8187910199bd93129520183c093e19aa585c75 # v1.0.0
        with:
          policy: dd-trace-js

  tracing-macos:
    runs-on: macos-latest
    needs: [get-credentials]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/node/latest
      - uses: ./.github/actions/install
      - run: yarn test:trace:core:ci
      - uses: ./.github/actions/coverage
        with:
          flags: apm-capabilities-tracing-macos
          dd_api_key: ${{ needs.get-credentials.outputs.api_key }}
      - uses: ./.github/actions/push_to_test_optimization
        if: "!cancelled()"
        with:
          dd_api_key: ${{ needs.get-credentials.outputs.api_key }}

  tracing-ubuntu:
    runs-on: ubuntu-latest
    needs: [get-credentials]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/node/oldest-maintenance-lts
      - uses: ./.github/actions/install
      - run: yarn test:trace:core:ci
      - uses: ./.github/actions/node/newest-maintenance-lts
      - run: yarn test:trace:core:ci
      - uses: ./.github/actions/node/active-lts
      - run: yarn test:trace:core:ci
      - uses: ./.github/actions/node/latest
      - run: yarn test:trace:core:ci
      - uses: ./.github/actions/coverage
        with:
          flags: apm-capabilities-tracing-ubuntu
          dd_api_key: ${{ needs.get-credentials.outputs.api_key }}
      - uses: ./.github/actions/push_to_test_optimization
        if: "!cancelled()"
        with:
          dd_api_key: ${{ needs.get-credentials.outputs.api_key }}

  tracing-windows:
    runs-on: windows-latest
    needs: [get-credentials]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/node/latest
      - uses: ./.github/actions/install
        with:
          cache: "true"
      - run: yarn test:trace:core:ci
      - uses: ./.github/actions/coverage
        with:
          flags: apm-capabilities-tracing-windows
          dd_api_key: ${{ needs.get-credentials.outputs.api_key }}
      - uses: ./.github/actions/push_to_test_optimization
        if: "!cancelled()"
        with:
          dd_api_key: ${{ needs.get-credentials.outputs.api_key }}
