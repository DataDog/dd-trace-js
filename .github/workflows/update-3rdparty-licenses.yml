name: Update 3rd-party licenses

# `dd-license-attribution` does not yet read `bun.lock`; it only enumerates
# root deps from a `package-lock.json` (or other manager-specific lockfiles
# unrelated to bun). The repo ships only `bun.lock` at the root, so the
# upstream auto-update tool can no longer rebuild `LICENSE-3rdparty.csv` from
# scratch — it would drop every root runtime/optional dep on each run. Until
# bun.lock support lands upstream
# (https://github.com/watson/dd-license-attribution),
# `scripts/check_licenses.js` (run via `npm run lint`) is the source of truth
# for CSV completeness against `bun.lock`, `vendor/package-lock.json`, and
# `vendored-dependencies.csv`. Any new root runtime/optional dep ships with a
# manual `LICENSE-3rdparty.csv` update in the same PR; lint catches a missing
# entry locally and on every PR.
#
# This workflow now does the bare minimum needed to keep the existing required
# check name green — it asserts that `LICENSE-3rdparty.csv` is still present
# and non-empty on the PR head. The trigger no longer fires on `bun.lock`
# changes since we have no way to act on them; it stays on the vendor and
# vendored-deps paths so future tooling work has somewhere to plug back in.

on:
  pull_request:
    paths:
      - ".github/vendored-dependencies.csv"
      - "vendor/package-lock.json"

jobs:
  check-licenses:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify LICENSE-3rdparty.csv exists
        run: |
          if [[ ! -s LICENSE-3rdparty.csv ]]; then
            echo "❌ LICENSE-3rdparty.csv is missing or empty."
            echo ""
            echo "Restore the file (or regenerate it manually) and commit the result."
            exit 1
          fi
          echo "✅ LICENSE-3rdparty.csv is present (lint enforces row-level completeness)."
