name: Test Optimization

on:
  pull_request:
  push:
    branches: [master, mq-working-branch-master-*]
  schedule:
    - cron: 0 4 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

env:
  MOCHA_OPTIONS: ${{ github.ref == 'refs/heads/master' && '--retries 1' || '' }}

jobs:
  benchmarks-e2e:
    name: Performance and correctness tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/test-environment
          policy: dd-trace-js
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.octo-sts.outputs.token }}
      - uses: ./.github/actions/node/oldest-maintenance-lts
      - name: Test Optimization Performance Overhead Test
        run: yarn bench:e2e:test-optimization
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}

  integration:
    strategy:
      matrix:
        version: [oldest, maintenance, active, latest]
    name: ${{ github.workflow }} / integration (node-${{ matrix.version }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - uses: ./.github/actions/node
        with:
          version: ${{ matrix.version }}
      - uses: ./.github/actions/install
      - name: Get Playwright version from versions package.json
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(node -p "require('./packages/dd-trace/test/plugins/versions/package.json').dependencies['@playwright/test']")
          echo "version=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT
          echo "Playwright version: $PLAYWRIGHT_VERSION"
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - run: yarn test:integration:testopt:coverage
      - uses: ./.github/actions/coverage
        with:
          flags: test-optimization-testopt-${{ matrix.version }}
          dd_api_key: ${{ steps.dd-sts.outputs.api_key }}

  integration-playwright:
    strategy:
      matrix:
        node-version: [oldest, latest]
        playwright-version: [oldest, latest]
        spec:
          - playwright-reporting
          - playwright-efd
          - playwright-atr
          - playwright-test-management
          - playwright-active-test-span
          - playwright-impacted-tests
    name: integration-playwright (${{ matrix.playwright-version}}, node-${{ matrix.node-version }}, ${{ matrix.spec }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    container:
      image: ghcr.io/rochdev/playwright-tools@sha256:f36c96b0a8f6899692798f77e01df78bd920e272d66f7f0bf153896a9135aa91 # 1.54.1-4
    env:
      DD_SERVICE: dd-trace-js-integration-tests
      DD_CIVISIBILITY_AGENTLESS_ENABLED: 1
      OPTIONS_OVERRIDE: 1
      PLAYWRIGHT_VERSION: ${{ matrix.playwright-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - uses: ./.github/actions/node
        with:
          version: ${{ matrix.node-version }}
      - uses: ./.github/actions/install
      # We need this because the "oldest" playwright version depends on the major version of dd-trace
      # For v5 it's 1.18.0 and for v6 it's 1.38.0
      # We don't cache "latest" because it changes based on playwright releases.
      # We could do it, but we'd have to request GitHub API to get the latest version,
      # and the cache hit rate would be way lower than for "oldest", which should be 100%.
      - name: Get dd-trace major version
        if: matrix.playwright-version == 'oldest'
        id: dd-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MAJOR=$(echo $VERSION | cut -d. -f1)
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "dd-trace major version: $MAJOR"
      - name: Cache Playwright browsers
        if: matrix.playwright-version == 'oldest'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /github/home/.cache/ms-playwright
          key: playwright-browsers-oldest-dd${{ steps.dd-version.outputs.major }}
      - name: Configure Git safe directory
        # The Playwright job runs in a container where the checkout can be owned by a different UID.
        # Git rejects metadata commands in that checkout unless the workspace is marked as safe.
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: yarn test:integration:playwright:coverage
        env:
          NODE_OPTIONS: "-r ./ci/init"
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
          SPEC: ${{ matrix.spec }}
      - uses: ./.github/actions/coverage
        with:
          flags: test-optimization-playwright-${{ matrix.node-version }}-${{ matrix.playwright-version }}-${{ matrix.spec }}
          dd_api_key: ${{ steps.dd-sts.outputs.api_key }}

  integration-mocha:
    strategy:
      matrix:
        version: [oldest, latest]
        mocha-version: [5.2.0, latest]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      DD_SERVICE: dd-trace-js-integration-tests
      DD_CIVISIBILITY_AGENTLESS_ENABLED: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - uses: ./.github/actions/node
        with:
          version: ${{ matrix.version }}
      - uses: ./.github/actions/install
      - run: yarn test:integration:mocha:coverage
        env:
          NODE_OPTIONS: "-r ./ci/init"
          MOCHA_VERSION: ${{ matrix.mocha-version }}
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
      - uses: ./.github/actions/coverage
        with:
          flags: test-optimization-mocha-${{ matrix.version }}-${{ matrix.mocha-version }}
          dd_api_key: ${{ steps.dd-sts.outputs.api_key }}

  integration-jest:
    strategy:
      matrix:
        version: [oldest, latest]
        jest-version: [24.8.0, latest]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      DD_SERVICE: dd-trace-js-integration-tests
      DD_CIVISIBILITY_AGENTLESS_ENABLED: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - uses: ./.github/actions/node
        with:
          version: ${{ matrix.version }}
      - uses: ./.github/actions/install
      - run: yarn test:integration:jest:coverage
        env:
          NODE_OPTIONS: "-r ./ci/init"
          JEST_VERSION: ${{ matrix.jest-version }}
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
      - uses: ./.github/actions/coverage
        with:
          flags: test-optimization-jest-${{ matrix.version }}-${{ matrix.jest-version }}
          dd_api_key: ${{ steps.dd-sts.outputs.api_key }}

  integration-cucumber:
    strategy:
      matrix:
        version: [oldest, latest]
        cucumber-version: [7.0.0, latest]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      DD_SERVICE: dd-trace-js-integration-tests
      DD_CIVISIBILITY_AGENTLESS_ENABLED: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - uses: ./.github/actions/node
        with:
          version: ${{ matrix.version }}
      - uses: ./.github/actions/install
      - run: yarn test:integration:cucumber:coverage
        env:
          NODE_OPTIONS: "-r ./ci/init"
          CUCUMBER_VERSION: ${{ matrix.cucumber-version }}
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
      - uses: ./.github/actions/coverage
        with:
          flags: test-optimization-cucumber-${{ matrix.version }}-${{ matrix.cucumber-version }}
          dd_api_key: ${{ steps.dd-sts.outputs.api_key }}

  integration-selenium:
    strategy:
      matrix:
        version: [oldest, latest]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      DD_SERVICE: dd-trace-js-integration-tests
      DD_CIVISIBILITY_AGENTLESS_ENABLED: 1
      OPTIONS_OVERRIDE: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - uses: ./.github/actions/node
        with:
          version: ${{ matrix.version }}
      - name: Install Google Chrome
        run: |
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          if [ $? -ne 0 ]; then echo "Failed to add Google key"; exit 1; fi
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          if [ $? -ne 0 ]; then echo "Failed to install Google Chrome"; exit 1; fi
      - name: Install ChromeDriver
        run: |
          export CHROME_VERSION=$(google-chrome --version)
          CHROME_DRIVER_DOWNLOAD_URL=$(node --experimental-fetch scripts/get-chrome-driver-download-url.js)
          wget -q "$CHROME_DRIVER_DOWNLOAD_URL"
          if [ $? -ne 0 ]; then echo "Failed to download ChromeDriver"; exit 1; fi
          unzip chromedriver-linux64.zip
          sudo mv chromedriver-linux64/chromedriver /usr/bin/chromedriver
          sudo chmod +x /usr/bin/chromedriver
      - uses: ./.github/actions/install
      - run: yarn test:integration:selenium:coverage
        env:
          NODE_OPTIONS: "-r ./ci/init"
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
      - uses: ./.github/actions/coverage
        with:
          flags: test-optimization-selenium-${{ matrix.version }}
          dd_api_key: ${{ steps.dd-sts.outputs.api_key }}

  integration-cypress:
    strategy:
      matrix:
        version: [eol, oldest, latest]
        # 6.7.0 is the minimum version we support in <=5
        # 10.2.0 is the minimum version we support in >=6
        # 14.5.4 is the latest version that supports Node 18
        # The logic to decide whether the tests run lives in the individual spec files
        cypress-version: [6.7.0, 10.2.0, 14.5.4, latest]
        module-type: ["commonJS", "esm"]
        spec:
          - cypress-reporting
          - cypress-itr
          - cypress-efd
          - cypress-atr
          - cypress-test-management
          - cypress-impacted-tests
          - cypress-final-status
        exclude:
          # eol = Node 16: shouldTestsRun() always returns false for DD_MAJOR >= 6
          - version: eol
          # 6.7.0 is only supported for DD_MAJOR <= 5; never runs on this branch
          - cypress-version: 6.7.0
          # Node 18 (oldest) only supports 10.2.0 and 14.5.4, not latest
          - version: oldest
            cypress-version: latest
    name: integration-cypress (${{ matrix.cypress-version }}, node-${{ matrix.version }}, ${{ matrix.module-type }}, ${{ matrix.spec }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      DD_SERVICE: dd-trace-js-integration-tests
      DD_CIVISIBILITY_AGENTLESS_ENABLED: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - uses: ./.github/actions/node
        with:
          version: ${{ matrix.version }}
      - uses: ./.github/actions/install
      # We cache Cypress binaries for fixed versions (6.7.0, 10.2.0, 14.5.4) but not for "latest"
      # as that changes frequently and would have a low cache hit rate
      - name: Cache Cypress binary
        if: matrix.cypress-version != 'latest'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/Cypress
          key: cypress-binary-${{ matrix.cypress-version }}
      - run: yarn config set ignore-engines true
      - run: yarn test:integration:cypress:coverage --ignore-engines
        env:
          CYPRESS_VERSION: ${{ matrix.cypress-version }}
          NODE_OPTIONS: "-r ./ci/init"
          CYPRESS_MODULE_TYPE: ${{ matrix.module-type }}
          OPTIONS_OVERRIDE: 1
          SPEC: ${{ matrix.spec }}
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
      - uses: ./.github/actions/coverage
        with:
          flags: test-optimization-cypress-${{ matrix.version }}-${{ matrix.cypress-version }}-${{ matrix.module-type }}
          dd_api_key: ${{ steps.dd-sts.outputs.api_key }}

  integration-vitest:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    strategy:
      matrix:
        version: [oldest, latest]
    env:
      DD_SERVICE: dd-trace-js-integration-tests
      DD_CIVISIBILITY_AGENTLESS_ENABLED: 1
      OPTIONS_OVERRIDE: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - uses: ./.github/actions/node
        with:
          version: ${{ matrix.version }}
      - uses: ./.github/actions/install
      - run: yarn test:integration:vitest:coverage
        env:
          NODE_OPTIONS: "-r ./ci/init"
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
      - uses: ./.github/actions/coverage
        with:
          flags: test-optimization-vitest-${{ matrix.version }}
          dd_api_key: ${{ steps.dd-sts.outputs.api_key }}
