name: LLMObs

on:
  pull_request:
  push:
    branches: [master, mq-working-branch-master-*]
  schedule:
    - cron: 0 4 * * *
  workflow_dispatch:
    inputs:
      latest-version:
        description: "Node version to use"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.latest-version }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

env:
  LATEST_VERSION: ${{ inputs.latest-version }}

jobs:
  sdk:
    strategy:
      fail-fast: false
      matrix:
        version: [oldest, maintenance, active, latest]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/testagent/start
      - uses: ./.github/actions/node
        with:
          version: ${{ matrix.version }}
      - uses: ./.github/actions/install
      - run: yarn test:llmobs:sdk:ci
      - if: always()
        uses: ./.github/actions/testagent/logs
        with:
          suffix: llmobs-${{ github.job }}-${{ matrix.version }}
      - uses: ./.github/actions/coverage
        with:
          flags: llmobs-sdk-${{ matrix.version }}
      - uses: ./.github/actions/upload-junit-artifacts
        if: "!cancelled()"
        with:
          id: ${{ github.job }}-${{ strategy.job-index }}

  openai:
    strategy:
      fail-fast: false
      matrix:
        version: [oldest, latest]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PLUGINS: openai
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/plugins/test
        with:
          suite: plugins-and-llmobs
          node-set: ${{ matrix.version }}
          testagent: start-and-logs
          flags: llmobs-openai-${{ matrix.version }}
          log-suffix: llmobs-${{ github.job }}-${{ matrix.version }}
          artifact-id: ${{ github.job }}-${{ strategy.job-index }}

  langchain:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PLUGINS: langchain
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/plugins/test
        with:
          suite: plugins-and-llmobs
          node-floor: newest-maintenance-lts
          testagent: start-and-logs
          flags: llmobs-${{ github.job }}
          log-suffix: llmobs-${{ github.job }}
          artifact-id: ${{ github.job }}

  bedrock:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PLUGINS: aws-sdk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/plugins/test
        with:
          suite: llmobs
          testagent: start-and-logs
          flags: llmobs-${{ github.job }}
          log-suffix: llmobs-${{ github.job }}
          artifact-id: ${{ github.job }}

  vertex-ai:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PLUGINS: google-cloud-vertexai
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/plugins/test
        with:
          suite: plugins-and-llmobs
          testagent: start-and-logs
          flags: llmobs-${{ github.job }}
          log-suffix: llmobs-${{ github.job }}
          artifact-id: ${{ github.job }}

  ai:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PLUGINS: ai
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/plugins/test
        with:
          suite: plugins-and-llmobs
          node-set: latest
          testagent: start-and-logs
          flags: llmobs-${{ github.job }}
          log-suffix: llmobs-${{ github.job }}
          artifact-id: ${{ github.job }}

  anthropic:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PLUGINS: anthropic
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/plugins/test
        with:
          suite: plugins-and-llmobs
          testagent: start-and-logs
          flags: llmobs-${{ github.job }}
          log-suffix: llmobs-${{ github.job }}
          artifact-id: ${{ github.job }}

  claude-agent-sdk:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PLUGINS: claude-agent-sdk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The SDK is ESM-only. Tests use dynamic import() to load it.
      - uses: ./.github/actions/plugins/test
        with:
          suite: plugins-and-llmobs
          node-set: active
          testagent: start-and-logs
          flags: llmobs-${{ github.job }}
          log-suffix: llmobs-${{ github.job }}
          artifact-id: ${{ github.job }}

  google-genai:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PLUGINS: google-genai
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/plugins/test
        with:
          suite: plugins-and-llmobs
          testagent: start-and-logs
          flags: llmobs-${{ github.job }}
          log-suffix: llmobs-${{ github.job }}
          artifact-id: ${{ github.job }}

  langgraph:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PLUGINS: langgraph
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/plugins/test
        with:
          node-floor: newest-maintenance-lts

  modelcontextprotocol-sdk:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PLUGINS: modelcontextprotocol-sdk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/plugins/test
