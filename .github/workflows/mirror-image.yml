name: Mirror image to GHCR

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Source image to mirror (e.g. mcr.microsoft.com/azure-storage/azurite)"
        required: true
        type: string
      tag:
        description: "Image tag to mirror (e.g. latest, 3.33.0)"
        required: true
        type: string

permissions:
  packages: write
  id-token: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub Token via dd-octo-sts
        id: generate-token
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          scope: DataDog/dd-trace-js
          policy: self.mirror-image

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ steps.generate-token.outputs.token }}

      - name: Resolve GHCR target
        env:
          IMAGE: ${{ inputs.image }}
          REPOSITORY: ${{ github.repository }}
        run: |
          GHCR_TARGET="$(echo "ghcr.io/${REPOSITORY}/${IMAGE}" | tr '[:upper:]' '[:lower:]')"
          echo "GHCR_TARGET=${GHCR_TARGET}" >> $GITHUB_ENV

      - name: Mirror manifest to GHCR
        env:
          SOURCE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
        run: |
          docker buildx imagetools create \
            --tag "${GHCR_TARGET}:${TAG}" \
            "${SOURCE}:${TAG}"
