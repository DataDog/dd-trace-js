name: All Green
on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: 0 4 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  all-green:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      actions: read
    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/dd-trace-js
          policy: all-green
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .github
            scripts
      - uses: ./.github/actions/node
        with:
          version: active
      - run: yarn add @actions/core @actions/github octokit
      - run: node scripts/all-green.mjs
        env:
          DELAY: ${{ github.run_attempt == 1 && '1' || '0' }} # 1 minute on first attempt, no delay on reruns
          RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
          POLLING_INTERVAL: 1
          RETRIES: 20
      - name: Download artifacts
        if: "!cancelled() && hashFiles('run-ids.txt') != ''"
        run: |
          mkdir -p junit-results coverage-results
          while IFS= read -r run_id; do
            gh run download "$run_id" \
              --pattern "junit-*" \
              --dir "junit-results/$run_id" \
              2>/dev/null || true &
            gh run download "$run_id" \
              --pattern "coverage-*" \
              --dir "coverage-results/$run_id" \
              2>/dev/null || true &
          done < run-ids.txt
          wait
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
      - if: "!cancelled()"
        uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - if: "!cancelled()"
        uses: ./.github/actions/datadog-ci
      - if: "!cancelled()"
        run: |
          find junit-results -name "*.xml" \
            | xargs -r datadog-ci junit upload --service dd-trace-js-tests
        env:
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
      - if: "!cancelled()"
        run: |
          find coverage-results -name "lcov.info" -printf "%h\n" \
            | xargs -r datadog-ci coverage upload
        env:
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
