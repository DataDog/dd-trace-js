name: All Green
on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: 0 4 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  all-green:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/dd-trace-js
          policy: all-green
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .github
            scripts
      - uses: ./.github/actions/node
        with:
          version: active
      - run: yarn add @actions/core @actions/github octokit
      - run: node scripts/all-green.mjs
        env:
          DELAY: ${{ github.run_attempt == 1 && '1' || '0' }} # 1 minute on first attempt, no delay on reruns
          RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
          POLLING_INTERVAL: 1
          RETRIES: 20
      # Merge every downloaded per-cell `coverage-*` artifact's lcov report into a single
      # `coverage-upload/lcov/lcov.info`, uploaded to both Codecov and Datadog.
      - if: "!cancelled()"
        run: node scripts/group-coverage.mjs
      - if: "!cancelled()"
        uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - if: "!cancelled()"
        uses: ./.github/actions/datadog-ci
      # The three uploads below (junit → Datadog, coverage → Datadog, coverage → Codecov) are
      # independent of each other, and each takes roughly the same few seconds, so they run as
      # backgrounded subshells in one step instead of as sequential steps. `wait` on every pid
      # collects each exit code so a failure in any of them still fails the step; their log lines
      # can interleave, but that's an acceptable trade for running them concurrently.
      - if: "!cancelled()"
        run: |
          pids=()

          datadog-ci junit upload --service dd-trace-js-tests --auto-discovery junit-results &
          pids+=($!)

          # A single Datadog upload for every cell's coverage, flagged `coverage`.
          if [ -d coverage-upload/lcov ]; then
            datadog-ci coverage upload coverage-upload/lcov --flags coverage &
            pids+=($!)
          fi

          # A single Codecov upload for every cell's coverage via the CLI directly, pointed at the
          # same lcov report as the Datadog upload. Codecov's own coverage gate (`.codecov.yml`) is
          # line-based `patch` coverage only, and this repo's `patch-istanbul-lib-coverage.js` already
          # folds branch/function hit data into lcov's `DA:` records, so a separate istanbul JSON
          # upload isn't needed for the gate — only Codecov's UI-only branch/function summary widgets
          # would have used it. `master-coverage` is the flag `.codecov.yml` gates `codecov/patch` on;
          # attach it only on PRs targeting master so release-branch PRs auto-pass. The SHA/branch/PR
          # are passed explicitly because All Green checks out the merge ref, not the head the other
          # workflows reported coverage for. No token: the repo uploads tokenless (a Codecov token
          # would have to be an org secret, which forks can't read).
          if [ -d coverage-upload/lcov ]; then
            (
              commit_args=(--sha "$HEAD_SHA" --branch "$HEAD_BRANCH")
              upload_args=(--sha "$HEAD_SHA" --dir coverage-upload/lcov -F coverage)
              if [ -n "$PR_NUMBER" ]; then
                commit_args+=(--pr "$PR_NUMBER")
                upload_args+=(--pr "$PR_NUMBER")
              fi
              if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ "$BASE_REF" = "master" ]; then
                upload_args+=(-F master-coverage)
              fi
              pip install --quiet codecov-cli
              codecovcli create-commit "${commit_args[@]}"
              codecovcli create-report --sha "$HEAD_SHA"
              codecovcli do-upload "${upload_args[@]}"
            ) &
            pids+=($!)
          fi

          exit_code=0
          for pid in "${pids[@]}"; do
            wait "$pid" || exit_code=1
          done
          exit $exit_code
        env:
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
