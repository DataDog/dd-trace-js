name: All Green
on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: 0 4 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  all-green:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/dd-trace-js
          policy: all-green
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .github
            scripts
      - uses: ./.github/actions/node
        with:
          version: active
      - run: yarn add @actions/core @actions/github octokit
      - run: node scripts/all-green.mjs
        env:
          DELAY: ${{ github.run_attempt == 1 && '1' || '0' }} # 1 minute on first attempt, no delay on reruns
          RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
          POLLING_INTERVAL: 1
          RETRIES: 20
      # Sort every downloaded per-cell `coverage-*` artifact into a single `coverage-upload/{lcov,json}/`
      # directory. The reports are not merged here — both backends merge same-flag uploads
      # server-side — so each cell's report passes through byte-for-byte. Codecov gets the istanbul
      # JSON (carries branch/function coverage), Datadog gets the lcov.
      - if: "!cancelled()"
        run: node scripts/group-coverage.mjs
      - if: "!cancelled()"
        uses: ./.github/actions/dd-sts-api-key
        id: dd-sts
      - if: "!cancelled()"
        uses: ./.github/actions/datadog-ci
      - if: "!cancelled()"
        run: datadog-ci junit upload --service dd-trace-js-tests --auto-discovery junit-results
        env:
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
      # A single Datadog upload for every cell's coverage, flagged `coverage`. Datadog reads the lcov
      # reports; it does not ingest istanbul's JSON.
      - if: "!cancelled()"
        run: |
          [ -d coverage-upload/lcov ] || exit 0
          datadog-ci coverage upload coverage-upload/lcov --flags coverage
        env:
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
      # A single Codecov upload for every cell's coverage via the CLI directly. Codecov reads
      # branch/function coverage from the istanbul JSON, so the upload points at `json/`.
      # `master-coverage` is the flag `.codecov.yml` gates `codecov/patch` on; attach it only on PRs
      # targeting master so release-branch PRs auto-pass. The SHA/branch/PR are passed explicitly
      # because All Green checks out the merge ref, not the head the other workflows reported coverage
      # for. No token: the repo uploads tokenless (a Codecov token would have to be an org secret,
      # which forks can't read).
      - if: "!cancelled()"
        run: |
          [ -d coverage-upload/json ] || exit 0
          commit_args=(--sha "$HEAD_SHA" --branch "$HEAD_BRANCH")
          upload_args=(--sha "$HEAD_SHA" --dir coverage-upload/json -F coverage)
          if [ -n "$PR_NUMBER" ]; then
            commit_args+=(--pr "$PR_NUMBER")
            upload_args+=(--pr "$PR_NUMBER")
          fi
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ "$BASE_REF" = "master" ]; then
            upload_args+=(-F master-coverage)
          fi
          pip install --quiet codecov-cli
          codecovcli create-commit "${commit_args[@]}"
          codecovcli create-report --sha "$HEAD_SHA"
          codecovcli do-upload "${upload_args[@]}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
