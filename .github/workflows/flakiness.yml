name: "[Flakiness Report]"

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Number of days to look back"
        default: "1"
        type: string
      branch:
        description: "Branch to filter (leave empty for all branches)"
        type: string
      occurrences:
        description: "Minimum number of occurrences to consider a test flaky"
        default: "1"
        type: string
  schedule:
    - cron: "0 6 * * 1"

jobs:
  flakiness:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      id-token: write
    env:
      BRANCH: ${{ inputs.branch }}
      DAYS: ${{ inputs.days || '7' }}
      OCCURRENCES: ${{ inputs.occurrences || '2' }}
    steps:
      - name: Get GitHub Token via dd-octo-sts
        id: generate-token
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          scope: DataDog/dd-trace-js
          policy: self.flakiness
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .github
            package.json
            scripts
            yarn.lock
      - uses: ./.github/actions/node
        with:
          version: active
      - run: yarn install --frozen-lockfile --ignore-scripts
      - run: node scripts/flakiness.mjs
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
      - run: cat flakiness.md >> $GITHUB_STEP_SUMMARY
      - id: slack
        run: echo "report=$(cat flakiness.txt)" >> $GITHUB_OUTPUT
      - uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v2.1.0
        if: github.event_name == 'schedule'
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "${{ steps.slack.outputs.report }}"
