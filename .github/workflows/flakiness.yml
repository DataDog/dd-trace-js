name: "[Flakiness Report]"

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back'
        default: '1'
        type: string
      branch:
        description: 'Branch to filter (leave empty for all branches)'
        type: string
      occurrences:
        description: 'Minimum number of occurrences to consider a test flaky'
        default: '1'
        type: string
  schedule:
    - cron: "0 6 * * 1"

jobs:
  flakiness:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BRANCH: ${{ inputs.branch }}
      DAYS: ${{ inputs.days || '7' }}
      OCCURRENCES: ${{ inputs.occurrences || '2' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .github
            package.json
            scripts
            yarn.lock
      - uses: ./.github/actions/node
        with:
          version: active
      - run: yarn install --frozen-lockfile --ignore-scripts
      - run: node scripts/flakiness.mjs
      - run: cat flakiness.md >> "$GITHUB_STEP_SUMMARY"
      - id: slack
        run: echo "report=$(cat flakiness.txt)" >> "$GITHUB_OUTPUT"
      - uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v2.1.0
        if: github.event_name == 'schedule'
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "${{ steps.slack.outputs.report }}"
