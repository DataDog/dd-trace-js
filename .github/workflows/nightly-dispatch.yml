name: Nightly Testing

on:
  workflow_dispatch:
    inputs:
      runApmIntegrations:
        description: 'APM Integration Tests'
        required: false
        default: true
        type: boolean
      runApmCapabilities:
        description: 'APM Capabilities Tests'
        required: false
        default: true
        type: boolean
      runLlmobs:
        description: 'LLM-OBS Tests'
        required: false
        default: true
        type: boolean
      runPlatform:
        description: 'Platform Tests'
        required: false
        default: true
        type: boolean
      runServerless:
        description: 'Serverless Tests'
        required: false
        default: true
        type: boolean

jobs:
  apm-integrations:
    if: inputs.runApmIntegrations
    uses: ./.github/workflows/apm-integrations.yml
    with:
      runNightly: 'true'
  
  apm-capabilities:
    if: inputs.runApmCapabilities
    uses: ./.github/workflows/apm-capabilities.yml
    with:
      runNightly: 'true'
  
  llmobs:
    if: inputs.runLlmobs
    uses: ./.github/workflows/llmobs.yml
    with:
      runNightly: 'true'
  
  platform:
    if: inputs.runPlatform
    uses: ./.github/workflows/platform.yml
    with:
      runNightly: 'true'
  
  serverless:
    if: inputs.runServerless
    uses: ./.github/workflows/serverless.yml
    with:
      runNightly: 'true'
