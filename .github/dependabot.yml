# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Regular github actions
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/*"
      - "/.github/actions/*/*"
      - "/.github/workflows/*"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
      exclude:
        - "@datadog/*"
    groups:
      gh-actions-packages:
        patterns:
          - "*"
      security-non-production:
        applies-to: security-updates
        patterns:
          - "*"
    labels:
      - dependabot
      - dependencies
      - github_actions
      - semver-patch

  # Docker base images in our Dockerfiles. Already digest-pinned references
  # (image:tag@sha256:...) get both the tag and the digest bumped on each
  # release; bare tags would only have the tag bumped, so every FROM here is
  # pinned by digest. docker-compose.yml is handled separately (GHCR mirror).
  - package-ecosystem: "docker"
    directories:
      - "/.github/editorconfig-checker"
      - "/.github/playwright"
      - "/.github/selenium"
      - "/benchmark/sirun"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
    labels:
      - dependabot
      - dependencies
      - docker
      - semver-patch
    groups:
      docker-images:
        patterns:
          - "*"
      security-non-production:
        applies-to: security-updates
        patterns:
          - "*"

  # Regular npm packages that fall into our supported ranges besides OTEL
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/docs"
      - "/.github/actions/datadog-ci"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 100
    cooldown:
      default-days: 5
      exclude:
        - "@datadog/*"
    versioning-strategy: "increase"
    labels:
      - dependabot
      - dependencies
      - javascript
      - semver-patch
    ignore:
      # Internal dependencies that we update manually
      - dependency-name: "@datadog/libdatadog"
      - dependency-name: "@datadog/native-appsec"
      - dependency-name: "@datadog/native-iast-taint-tracking"
      - dependency-name: "@datadog/native-metrics"
      - dependency-name: "@datadog/pprof"
      - dependency-name: "@datadog/sketches-js"
      - dependency-name: "@datadog/wasm-js-rewriter"

      - dependency-name: "@types/node"
        # Update the types manually with new Node.js version support
        update-types: ["version-update:semver-major"]
      - dependency-name: "glob"
        # 11.0.0 onwards only supports Node.js 20 and above
        update-types: ["version-update:semver-major"]
      - dependency-name: "@opentelemetry/core"
        # 2.0.0 onwards only supports Node.js 18.19.0 and above
        update-types: ["version-update:semver-major"]
      - dependency-name: "@opentelemetry/resources"
        # 2.0.0 onwards only supports Node.js 18.19.0 and above
        update-types: ["version-update:semver-major"]
        # @opentelemetry/api and @opentelemetry/api-logs have to be widened, not increased.
        # Thus, we ignore them and update them manually.
      - dependency-name: "@opentelemetry/api"
      - dependency-name: "@opentelemetry/api-logs"
    groups:
      dev-minor-and-patch-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      runtime-minor-and-patch-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Security fixes for shipped (production) dependencies; a human reviews majors.
      security-production:
        applies-to: security-updates
        dependency-type: "production"
        patterns:
          - "*"
      # Security fixes for dev-only dependencies; auto-merges fully.
      security-non-production:
        applies-to: security-updates
        dependency-type: "development"
        patterns:
          - "*"

  # Vendored dependencies
  - package-ecosystem: "npm"
    directories:
      - "/vendor"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 100
    cooldown:
      default-days: 5
    labels:
      - dependabot
      - dependencies
      - javascript
      - semver-patch
    ignore:
      - dependency-name: "jest-docblock"
        # 30.0.0 onwards only supports Node.js 18.14.x and above
        update-types: ["version-update:semver-major"]
      - dependency-name: "lru-cache"
        # 11.0.0 onwards only supports Node.js 20 and above
        update-types: ["version-update:semver-major"]
      - dependency-name: "limiter"
        # 2.0.0 onwards breaks our tests. 3.0.0 works but it requires Node.js v16.
        # That breaks cypress in our v5 release line. Update when v5 is EOL.
        # Reverting this commit should suffice.
        update-types: ["version-update:semver-major"]
      - dependency-name: "@opentelemetry/core"
        # 2.0.0 onwards only supports Node.js 18.19.0 and above
        update-types: ["version-update:semver-major"]
      - dependency-name: "@opentelemetry/resources"
        # 2.0.0 onwards only supports Node.js 18.19.0 and above
        update-types: ["version-update:semver-major"]
      - dependency-name: "meriyah"
        # 7.0.0 onwards only supports Node.js 20 and above
        update-types: ["version-update:semver-major"]
      - dependency-name: "@rspack/*"
        # 2.0.0 onwards only supports Node.js 20 and above
        update-types: ["version-update:semver-major"]
    groups:
      vendor-minor-and-patch-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Vendored code is bundled into the shipped package, so it counts as production.
      security-production:
        applies-to: security-updates
        patterns:
          - "*"

  # Instrumented library support range
  - package-ecosystem: "npm"
    directories:
      - "/packages/dd-trace/test/plugins/versions"
    schedule:
      interval: "daily"
    # One slot per cohort group below plus headroom; with the cohort design a
    # single blocked group otherwise stalls every other group.
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
      exclude:
        - "@datadog/*"
    labels:
      - dependabot
      - dependencies
      - javascript
      - semver-patch
    ignore:
      - dependency-name: "office-addin-mock"
        # Pinned to 2.x due to compatibility issues with newer major versions
        update-types: ["version-update:semver-major"]
    # Cohort-based groups so a single breaking bump only blocks its own PR. A dependency lands
    # in the first cohort it matches; `test-versions` is the catch-all for the long tail
    # (OpenTelemetry, OpenFeature, logging, templating, serialization, runtimes, misc).
    groups:
      ai-and-llm:
        patterns:
          - "@ai-sdk/*"
          - "@anthropic-ai/sdk"
          - "@google-cloud/vertexai"
          - "@google/genai"
          - "@langchain/*"
          - "@modelcontextprotocol/sdk"
          - "@openai/*"
          - "ai"
          - "langchain"
          - "openai"
      cloud-and-messaging:
        patterns:
          - "@aws-sdk/*"
          - "@azure/*"
          - "@confluentinc/kafka-javascript"
          - "@google-cloud/*"
          - "@nats-io/*"
          - "@smithy/*"
          - "amqp10"
          - "amqplib"
          - "avsc"
          - "aws-sdk"
          - "azure-functions-core-tools"
          - "bullmq"
          - "durable-functions"
          - "kafkajs"
          - "rhea"
      databases:
        patterns:
          - "@elastic/*"
          - "@node-redis/*"
          - "@opensearch-project/*"
          - "@prisma/*"
          - "@redis/*"
          - "aerospike"
          - "bson"
          - "cassandra-driver"
          - "couchbase"
          - "elasticsearch"
          - "generic-pool"
          - "ioredis"
          - "iovalkey"
          - "knex"
          - "mariadb"
          - "memcached"
          - "mongodb"
          - "mongodb-core"
          - "mongoose"
          - "mquery"
          - "mysql"
          - "mysql2"
          - "oracledb"
          - "pg"
          - "pg-cursor"
          - "pg-native"
          - "pg-query-stream"
          - "prisma"
          - "redis"
          - "sequelize"
          - "sharedb"
          - "sqlite3"
          - "tedious"
      web-frameworks:
        patterns:
          - "@apollo/*"
          - "@fastify/*"
          - "@graphql-tools/*"
          - "@grpc/*"
          - "@hapi/*"
          - "@hono/*"
          - "@koa/*"
          - "apollo-server-core"
          - "apollo-server-express"
          - "apollo-server-fastify"
          - "axios"
          - "body-parser"
          - "connect"
          - "cookie"
          - "cookie-parser"
          - "ejs"
          - "express"
          - "express-mongo-sanitize"
          - "express-session"
          - "fastify"
          - "find-my-way"
          - "graphql"
          - "graphql-tag"
          - "graphql-tools"
          - "graphql-yoga"
          - "handlebars"
          - "hapi"
          - "hono"
          - "koa"
          - "koa-route"
          - "koa-router"
          - "koa-websocket"
          - "ldapjs"
          - "ldapjs-promise"
          - "light-my-request"
          - "loopback"
          - "microgateway-core"
          - "middie"
          - "multer"
          - "passport"
          - "passport-http"
          - "passport-local"
          - "pug"
          - "request"
          - "restify"
          - "router"
          - "undici"
          - "ws"
      testing-and-build:
        patterns:
          - "@babel/*"
          - "@cucumber/*"
          - "@electron/*"
          - "@fast-check/jest"
          - "@happy-dom/jest-environment"
          - "@jest/*"
          - "@playwright/test"
          - "@vitest/*"
          - "babel-jest"
          - "cypress"
          - "cypress-fail-fast"
          - "electron"
          - "esbuild"
          - "jest"
          - "jest-*"
          - "mocha"
          - "mocha-each"
          - "next"
          - "nock"
          - "nyc"
          - "office-addin-mock"
          - "playwright"
          - "playwright-core"
          - "react"
          - "react-dom"
          - "selenium-webdriver"
          - "sinon"
          - "tinypool"
          - "typescript"
          - "vitest"
          - "workerpool"
      test-versions:
        patterns:
          - "*"
      security-non-production:
        applies-to: security-updates
        patterns:
          - "*"

  # Esbuild integration test dependencies
  - package-ecosystem: "npm"
    directories:
      - "/integration-tests/esbuild"
      - "/integration-tests/appsec/iast-esbuild-esm"
      - "/integration-tests/appsec/iast-esbuild-cjs"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1
    cooldown:
      default-days: 3
      exclude:
        - "@datadog/*"
    labels:
      - dependabot
      - dependencies
      - javascript
      - semver-patch
    ignore:
      - dependency-name: "express"
        # Update express manually for now due to esbuild breaking otherwise
        update-types: ["version-update:semver-major"]
    groups:
      test-versions:
        patterns:
          - "*"
      security-non-production:
        applies-to: security-updates
        patterns:
          - "*"
