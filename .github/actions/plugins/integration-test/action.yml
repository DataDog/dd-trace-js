name: Plugin Integration Tests
description: Run plugin integration tests
inputs:
  suffix:
    description: 'Unique suffix for artifact naming — required when called from a matrix job.'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - uses: ./.github/actions/dd-sts-api-key
      id: dd-sts
    - uses: ./.github/actions/testagent/start
    - uses: ./.github/actions/node/oldest-maintenance-lts
    - uses: ./.github/actions/install
    - run: yarn test:integration:plugins:coverage
      shell: bash
    - uses: ./.github/actions/node/latest
    - run: yarn test:integration:plugins:coverage
      shell: bash
    - uses: ./.github/actions/coverage
      with:
        flags: plugins-${{ github.job }}
        dd_api_key: ${{ steps.dd-sts.outputs.api_key }}
    - if: always()
      uses: ./.github/actions/testagent/logs
      with:
        suffix: integration-test-${{ github.job }}
    - uses: ./.github/actions/upload-junit-artifacts
      if: "!cancelled()"
      with:
        id: ${{ github.job }}-integration${{ inputs.suffix != '' && format('-{0}', inputs.suffix) || '' }}
