name: Plugin Tests
description: Run plugin tests
inputs:
  node-floor:
    description: 'Lower Node alias: oldest-maintenance-lts or newest-maintenance-lts.'
    required: false
    default: oldest-maintenance-lts
  suffix:
    description: 'Unique suffix for artifact naming — required when called from a matrix job.'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - uses: ./.github/actions/dd-sts-api-key
      id: dd-sts
    - if: ${{ inputs.node-floor == 'oldest-maintenance-lts' }}
      uses: ./.github/actions/node/oldest-maintenance-lts
    - if: ${{ inputs.node-floor == 'newest-maintenance-lts' }}
      uses: ./.github/actions/node/newest-maintenance-lts
    - uses: ./.github/actions/install
    - run: yarn test:plugins:ci
      shell: bash
    - uses: ./.github/actions/node/latest
    - run: yarn test:plugins:ci
      shell: bash
    - uses: ./.github/actions/coverage
      with:
        flags: plugins-${{ github.job }}
        dd_api_key: ${{ steps.dd-sts.outputs.api_key }}
    - uses: ./.github/actions/upload-junit-artifacts
      if: "!cancelled()"
      with:
        id: ${{ github.job }}${{ inputs.suffix != '' && format('-{0}', inputs.suffix) || '' }}
