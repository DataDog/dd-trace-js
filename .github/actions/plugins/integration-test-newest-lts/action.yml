name: Plugin Integration Tests (Newest LTS)
description: Run plugin integration tests against the newest maintenance LTS Node version only
inputs:
  flags:
    description: 'Coverage flag identifier'
    required: false
    default: serverless-${{ github.job }}
runs:
  using: composite
  steps:
    - uses: ./.github/actions/dd-sts-api-key
      id: dd-sts
    - uses: ./.github/actions/node/newest-maintenance-lts
    - uses: ./.github/actions/install
    - run: npm run test:integration:plugins:coverage
      shell: bash
    - uses: ./.github/actions/coverage
      with:
        flags: ${{ inputs.flags }}
        dd_api_key: ${{ steps.dd-sts.outputs.api_key }}
    - uses: ./.github/actions/push_to_test_optimization
      if: "!cancelled()"
      with:
        dd_api_key: ${{ steps.dd-sts.outputs.api_key }}
