name: Plugin Integration Tests (Newest LTS)
description: Run plugin integration tests against the newest maintenance LTS Node version only
inputs:
  flags:
    description: 'Coverage flag identifier'
    required: false
    default: serverless-${{ github.job }}
  suffix:
    description: 'Unique suffix for artifact naming — required when called from a matrix job.'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - uses: ./.github/actions/dd-sts-api-key
      id: dd-sts
    - uses: ./.github/actions/node/newest-maintenance-lts
    - uses: ./.github/actions/install
    - run: yarn test:integration:plugins:coverage
      shell: bash
    - uses: ./.github/actions/coverage
      with:
        flags: ${{ inputs.flags }}
        dd_api_key: ${{ steps.dd-sts.outputs.api_key }}
    - uses: ./.github/actions/upload-junit-artifacts
      if: "!cancelled()"
      with:
        id: ${{ github.job }}${{ inputs.suffix != '' && format('-{0}', inputs.suffix) || '' }}
