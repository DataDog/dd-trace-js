name: Install datadog-ci
description: Install @datadog/datadog-ci from npm and add it to PATH.

runs:
  using: composite
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'

    # Stay on npm here so the action works in container jobs that lack `unzip`
    # (the playwright matrix runs in `ghcr.io/datadog/dd-trace-js/playwright-tools`,
    # which ships without it and breaks `oven-sh/setup-bun`). `package.json` pins
    # `@datadog/datadog-ci` to an exact version, so the lockfile-less install is
    # reproducible.
    - uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      with:
        max_attempts: 3
        timeout_minutes: 5
        retry_wait_seconds: 30
        command: |
          cd ${{ github.workspace }}/.github/actions/datadog-ci
          npm install --no-save --ignore-scripts --no-audit --no-fund

    - shell: bash
      run: echo "${{ github.workspace }}/.github/actions/datadog-ci/node_modules/.bin" >> $GITHUB_PATH
