name: Node.js
description: Install the version of Node.js matching the input identifier
inputs:
  version:
    description: "Version identifier of the version to use."
    required: false
    default: 'latest'
runs:
  using: composite
  steps:
    # Retry once on failure to work around transient runner issues (e.g. flaky
    # setup-node or setup-bun network calls).
    - id: attempt
      uses: ./.github/actions/node/setup
      continue-on-error: true
      with:
        version: ${{ inputs.version }}
    - if: steps.attempt.outcome == 'failure'
      shell: bash
      run: sleep 60
    - if: steps.attempt.outcome == 'failure'
      uses: ./.github/actions/node/setup
      with:
        version: ${{ inputs.version }}
