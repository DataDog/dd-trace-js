name: Push to Test Optimization
description: Download all JUnit artifacts from this run and upload to Datadog Test Optimization

runs:
  using: composite
  steps:
    - shell: bash
      run: mkdir -p junit-results
    - if: github.actor != 'dependabot[bot]'
      # see https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows#pull-request-events-for-forked-repositories
      #
      # > Workflows triggered by Dependabot pull requests are treated as though they are
      # >  from a forked repository, and are also subject to these restrictions.
      #
      # Which means they do not have access to secrets.
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: junit-*
        path: junit-results
    - id: check
      shell: bash
      run: |
        count=$(find junit-results -name "*.xml" | wc -l | tr -d ' ')
        echo "has_files=$([ "$count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
    - if: steps.check.outputs.has_files == 'true'
      uses: ./.github/actions/dd-sts-api-key
      id: dd-sts
    - if: steps.check.outputs.has_files == 'true'
      uses: ./.github/actions/datadog-ci
    - if: steps.check.outputs.has_files == 'true'
      shell: bash
      run: find junit-results -name "*.xml" | xargs datadog-ci junit upload --service dd-trace-js-tests
      env:
        DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
