name: upload-node-reports
description: Scrub and upload Node.js diagnostic reports as a CI artifact when present.

inputs:
  name:
    description: "Artifact name suffix (typically the job name)"
    required: true

runs:
  using: composite
  steps:
    - name: Scrub diagnostic reports
      shell: bash
      run: node scripts/scrub-node-reports.js node-reports node-reports-scrubbed

    - name: Upload diagnostic reports
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: node-reports-${{ inputs.name }}
        path: node-reports-scrubbed/
        if-no-files-found: ignore
        retention-days: 7
