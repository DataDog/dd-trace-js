name: Upload JUnit Artifacts
description: Upload JUnit XML test result files as GitHub Actions artifacts for later collection

inputs:
  id:
    description: Unique identifier for these artifacts — include all matrix variables for matrix jobs
    required: true

runs:
  using: composite
  steps:
    - if: github.actor != 'dependabot[bot]'
      id: check
      shell: bash
      run: |
        count=$(find . -maxdepth 1 -name "*.xml" | wc -l | tr -d ' ')
        echo "has_xml=$([ "$count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
    - if: github.actor != 'dependabot[bot]' && steps.check.outputs.has_xml == 'true'
      shell: bash
      # Store CI context as sourceable shell variables so the central upload job
      # can restore them per artifact. JOB_CHECK_RUN_ID (the numeric check run ID
      # used to build the job URL in Datadog) may be absent on older GHE versions.
      run: |
        echo "GITHUB_JOB=$GITHUB_JOB" > .dd-ci-metadata
        [ -n "${JOB_CHECK_RUN_ID:-}" ] && echo "JOB_CHECK_RUN_ID=$JOB_CHECK_RUN_ID" >> .dd-ci-metadata || true
    - if: github.actor != 'dependabot[bot]' && steps.check.outputs.has_xml == 'true'
      shell: bash
      env:
        ARTIFACT_NAME: junit-${{ inputs.id }}
      run: |
        node --input-type=module - <<'EOF'
        import { execSync } from 'node:child_process'
        import { readdirSync } from 'node:fs'
        import { createRequire } from 'node:module'

        const require = createRequire(import.meta.url)
        const delays = [0, 5_000, 15_000]
        for (const delay of delays) {
          if (delay) await new Promise(r => setTimeout(r, delay))
          try {
            execSync(
              'npm install --prefix /tmp/artifact-upload @actions/artifact --silent',
              { stdio: 'inherit' }
            )
            const { DefaultArtifactClient } =
              require('/tmp/artifact-upload/node_modules/@actions/artifact')
            const files = [
              ...readdirSync('.').filter(f => f.endsWith('.xml')),
              '.dd-ci-metadata',
            ]
            await new DefaultArtifactClient().uploadArtifact(
              process.env.ARTIFACT_NAME, files, '.',
              { retentionDays: 1 }
            )
            process.exit(0)
          } catch (err) {
            console.error(`Upload attempt failed: ${err.message}`)
          }
        }
        process.exit(1)
        EOF
