name: coverage
description: Verify coverage output and upload it to Datadog.

inputs:
  flags:
    description: "Coverage flags value"
    required: false
  report-dir:
    description: "Coverage report directory (defaults to 'coverage')"
    required: false
    default: coverage
runs:
  using: composite
  steps:
    # Retry once on failure to work around transient issues (e.g. flaky
    # network calls).
    - id: attempt
      uses: ./.github/actions/coverage/upload
      continue-on-error: true
      with:
        flags: ${{ inputs.flags }}
        report-dir: ${{ inputs.report-dir }}
    - if: steps.attempt.outcome == 'failure'
      shell: bash
      run: sleep 60
    - if: steps.attempt.outcome == 'failure'
      uses: ./.github/actions/coverage/upload
      with:
        flags: ${{ inputs.flags }}
        report-dir: ${{ inputs.report-dir }}
