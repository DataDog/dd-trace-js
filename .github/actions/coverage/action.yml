name: coverage
description: Verify coverage output and upload it to Codecov and Datadog.

inputs:
  flags:
    description: "Codecov flags value"
    required: false
  report-dir:
    description: "Coverage report directory (defaults to 'coverage')"
    required: false
    default: coverage
  dd_api_key:
    description: "Datadog API key for coverage upload"
    required: true

runs:
  using: composite
  steps:
    - name: Verify coverage output
      shell: bash
      run: node scripts/verify-coverage.js --flags "${{ inputs.flags }}"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
      with:
        flags: ${{ inputs.flags }}

    - name: Upload coverage to Datadog
      if: always()
      continue-on-error: true
      uses: DataDog/coverage-upload-github-action@d2cf302a39c05e0ad22063360a2bf6ce0cc4906c # v1
      with:
        api_key: ${{ inputs.dd_api_key }}
        files: .
        flags: ${{ inputs.flags }}
