name: coverage
description: Verify coverage output and upload it to Codecov and Datadog.

inputs:
  flags:
    description: "Codecov flags value"
    required: false
  report-dir:
    description: "Coverage report directory (defaults to 'coverage')"
    required: false
    default: coverage
  dd_api_key:
    description: "Datadog API key for coverage upload"
    required: false

runs:
  using: composite
  steps:
    - name: Verify coverage output
      shell: bash
      run: node scripts/verify-coverage.js --flags "${{ inputs.flags }}"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
      with:
        flags: ${{ inputs.flags }}

    - name: Strip branch coverage from LCOV for Datadog
      if: always()
      continue-on-error: true
      shell: bash
      run: |
        # Datadog includes BRDA/BRF/BRH (branch coverage) in its total calculation,
        # while Codecov only counts line coverage (DA/LF/LH). Stripping branch data
        # ensures parity between the two systems.
        for f in $(find . -path '*/coverage-node-*/lcov.info' 2>/dev/null); do
          grep -v '^BR[A-Z]' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
        done

    - name: Upload coverage to Datadog
      if: always()
      continue-on-error: true
      uses: DataDog/coverage-upload-github-action@v1
      with:
        api_key: ${{ inputs.dd_api_key }}
        files: .
        flags: ${{ inputs.flags }}
