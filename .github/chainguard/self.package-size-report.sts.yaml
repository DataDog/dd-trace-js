issuer: https://token.actions.githubusercontent.com

subject_pattern: repo:DataDog/dd-trace-js:(pull_request|ref:refs/heads/(master|mq-working-branch-master-.*))

claim_pattern:
  event_name: (pull_request|push)
  repository: DataDog/dd-trace-js
  job_workflow_ref: DataDog/dd-trace-js/\.github/workflows/project\.yml@refs/(pull/[0-9]+/merge|heads/(master|mq-working-branch-master-.*))

permissions:
  pull_requests: write
