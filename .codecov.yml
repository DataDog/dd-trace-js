codecov:
  notify:
    # All Green uploads coverage per sibling workflow as each one finishes, so without this,
    # Codecov would compute and post its status/patch check after the first upload lands, well
    # before the rest have arrived. `scripts/all-green.mjs` calls `codecovcli send-notifications`
    # once every workflow's uploads are done, which is the only thing that triggers notification
    # while this is set.
    manual_trigger: true

coverage:
  range: 90..100
  round: down
  precision: 2
  status:
    # The coverage action only attaches `master-coverage` on PRs targeting
    # master; other PRs auto-pass these statuses via the rules below.
    default_rules:
      flag_coverage_not_uploaded_behavior: pass
    # Ratchet: overall coverage may not drop below the PR's base at all. `auto`
    # compares against the base commit and `threshold: 0%` allows no degradation,
    # so any PR that lowers total coverage fails the project status.
    project:
      default:
        target: auto
        threshold: 0%
        if_not_found: success
        if_ci_failed: success
        only_pulls: true
        flags:
          - master-coverage
    patch:
      default:
        target: 95%
        if_not_found: success
        if_ci_failed: success
        only_pulls: true
        flags:
          - master-coverage

ignore:
  - "benchmark/sirun/**"
