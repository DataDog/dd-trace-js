[install]
saveTextLockfile = true
linker = "hoisted"

# Reject npm package versions younger than three days to widen the window in
# which a freshly-published compromised release is caught and pulled from the
# registry before it lands in our installs.
minimumReleaseAge = 259200

# Bun 1.3.14 only matches exact package names; our publishing pipeline is the
# trust boundary for these packages.
minimumReleaseAgeExcludes = [
  "@datadog/flagging-core",
  "@datadog/libdatadog",
  "@datadog/native-appsec",
  "@datadog/native-iast-taint-tracking",
  "@datadog/native-metrics",
  "@datadog/openfeature-node-server",
  "@datadog/pprof",
  "@datadog/wasm-js-rewriter",
]
