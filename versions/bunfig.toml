[install]
linker = "isolated"
saveTextLockfile = true

# Same three-day cooldown as the root bunfig: the plugin sandboxes pull deps
# from the public npm registry on every test run, so without the filter a
# freshly-published bad release of a plugin or its transitive dep would land
# in the matrix on the first CI run after publish.
minimumReleaseAge = 259200

# Keep the internal-package trust boundary aligned with the root install.
minimumReleaseAgeExcludes = [
  "@datadog/datadog-ci",
  "@datadog/flagging-core",
  "@datadog/libdatadog",
  "@datadog/native-appsec",
  "@datadog/native-iast-taint-tracking",
  "@datadog/native-metrics",
  "@datadog/openfeature-node-server",
  "@datadog/pprof",
  "@datadog/sketches-js",
  "@datadog/wasm-js-rewriter",
]
