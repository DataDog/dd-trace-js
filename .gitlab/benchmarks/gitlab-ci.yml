    # run-id-keyed prefix so they can be collected and compared for flakiness.
    # In production the run-id is supplied by the orchestrator, not hardcoded.
    EXTERNAL_S3_URL: "s3://relenv-benchmarking-data/dd-trace-js/external/5p1ke001/sample-${STABILITY_MONITORING_INDEX}/node-${MAJOR_VERSION}/"

